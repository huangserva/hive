appId: ai.hippoteam.desktop
productName: HippoTeam

extraMetadata:
  main: desktop/electron/main.mjs

directories:
  output: desktop/electron/release
  buildResources: desktop/electron/resources

files:
  - package.json
  - desktop/electron/main.mjs
  - desktop/electron/path-env.mjs
  - dist/**/*
  - web/dist/**/*

asar: true
asarUnpack:
  - node_modules/**/*.node
  - node_modules/better-sqlite3/**/*
  - node_modules/node-pty/**/*

npmRebuild: true
buildDependenciesFromSource: false

mac:
  category: public.app-category.developer-tools
  x64ArchFiles: "{**/node_modules/@roamhq/wrtc-darwin-arm64/**/*,**/node_modules/@tailwindcss/oxide-darwin-arm64/**/*,**/node_modules/lightningcss-darwin-arm64/**/*,**/node_modules/node-pty/prebuilds/darwin-*/**/*}"
  target:
    - target: dmg
    - target: zip

win:
  target:
    - target: nsis

publish:
  provider: generic
  url: https://updates.example.invalid/hippoteam/
